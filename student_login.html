<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Login - Rojan Mocktest</title>
  <style>
    body, html {
      margin: 0; padding: 0;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f9fafb;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
    }
    .login-container {
      background: #fff;
      padding: 2.5rem 3rem;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      border-radius: 10px;
      width: 320px;
      text-align: center;
    }
    .login-container img {
      height: 60px;
      margin-bottom: 1rem;
      border-radius: 8px;
      object-fit: contain;
    }
    h2 {
      margin-bottom: 1rem;
      color: #27ae60;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    input[type="text"], input[type="password"] {
      padding: 0.8rem 1rem;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: #27ae60;
      outline: none;
    }
    button {
      padding: 0.8rem;
      background: #27ae60;
      border: none;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background: #1e8449;
    }
    .links {
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    .links a {
      color: #27ae60;
      text-decoration: none;
      font-weight: 600;
      margin: 0 0.5rem;
    }
    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-container" role="main" aria-label="Student Login Form">
    <img src="https://scontent.fktm10-1.fna.fbcdn.net/v/t39.30808-6/527959586_783324677549682_8386284971334615592_n.jpg?stp=dst-jpg_p526x296_tt6&_nc_cat=106&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=pWOnDOSdQBQQ7kNvwGFqPdN&_nc_oc=AdlQEIOOMZm5_1u5iLspRJbW0OJ676EiFJH0yg28Aw0wsSIaLU-uhbR48hOA45zMtb0iBBI-3DevUNzv8a6qpwXI&_nc_zt=23&_nc_ht=scontent.fktm10-1.fna&_nc_gid=WsuuU5wi7cnZcLmvQlqkjA&oh=00_AfSNp-D0hkEeivyA1ePdwP4oyVBPpiYDV_QI7PZjFp6VGQ&oe=689566BC" alt="Rojan Mocktest Logo" />
    <h2>Student Login</h2>
    <form>
      <label for="studentID" class="sr-only">Student gmail</label>
      <input type="text" id="student gmail" name="student gmail" placeholder="Student gmail" required autocomplete="username" />
      
      <label for="password" class="sr-only">Password</label>
      <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password" />
      
      <button type="submit">Login</button>
    </form>
    <div class="links">
      <a href="index.html" aria-label="Back to Home">Home</a> |
      <a href="admin_login.html" aria-label="Go to Admin Login">Admin Login</a>
    </div>
  </div>

</body>
</html>
