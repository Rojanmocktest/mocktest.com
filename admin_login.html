<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login - Rojan Mocktest</title>
  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #2c3e50;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }
    .login-container {
      background: #27ae60;
      padding: 2.5rem 3rem;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      width: 320px;
    }
    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 700;
      letter-spacing: 1.5px;
    }
    label {
      display: block;
      margin-bottom: 0.3rem;
      font-weight: 600;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.6rem 1rem;
      margin-bottom: 1rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      box-shadow: 0 0 8px #145214;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #145214;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background: #0e3a0f;
    }
    .error-message {
      background: #ff4d4d;
      color: #fff;
      padding: 0.7rem 1rem;
      margin-bottom: 1rem;
      border-radius: 6px;
      display: none;
      font-weight: 600;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="login-container" role="main" aria-labelledby="login-title">
    <h2 id="login-title">Admin Login</h2>

    <div class="error-message" id="error-message" role="alert" aria-live="assertive"></div>

    <form id="login-form" novalidate>
      <label for="email">Email (ID)</label>
      <input type="email" id="email" name="email" placeholder="Enter your admin email" required autocomplete="username" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />

      <button type="submit" aria-label="Log in as admin">Login</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorMessage = document.getElementById('error-message');

    const ADMIN_EMAIL = 'Rojangiree@edu.com.np';
    const ADMIN_PASSWORD = 'Rojzaangiri@admin.edu';

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      errorMessage.style.display = 'none';

      const email = form.email.value.trim();
      const password = form.password.value;

      if (email.toLowerCase() === ADMIN_EMAIL.toLowerCase() && password === ADMIN_PASSWORD) {
        // Login success - redirect
        window.location.href = 'admin_dashboard.html';
      } else {
        errorMessage.textContent = 'Invalid email or password. Please try again.';
        errorMessage.style.display = 'block';
      }
    });
  </script>

</body>
</html>
